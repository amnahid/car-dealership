services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-dealership-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    networks:
      - car-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: car-dealership-nginx
    restart: unless-stopped
    ports:
      - "81:81"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - car-network

  caddy:
    image: caddy:alpine
    container_name: car-dealership-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nginx
    networks:
      - car-network

networks:
  car-network:
    driver: bridge

volumes:
  caddy-data:
  caddy-config: