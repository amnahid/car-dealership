services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-dealership-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    networks:
      - car-network
    volumes:
      - /var/lib/car-dealership/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000', function(r){process.exit(0)}).on('error', function(){process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: car-dealership-nginx
    restart: unless-stopped
    ports:
      - "81:81"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/lib/car-dealership/uploads:/app/public/uploads:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - car-network

  caddy:
    image: caddy:alpine
    container_name: car-dealership-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nginx
    networks:
      - car-network

networks:
  car-network:
    driver: bridge

volumes:
  caddy-data:
  caddy-config: